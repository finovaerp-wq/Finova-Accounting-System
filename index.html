<!-- ==========================================
     CHANGE PASSWORD MODAL
=========================================== -->

<div
    class="modal fade"
    id="change-password-modal"
    tabindex="-1"
    aria-hidden="true">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <!-- HEADER -->

            <div class="modal-header">

                <h5 class="modal-title">

                    Change Password

                </h5>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">

                </button>

            </div>

            <!-- BODY -->

            <div class="modal-body">

                <form id="change-password-form">

                    <!-- CURRENT PASSWORD -->

                    <div class="mb-3">

                        <label class="form-label">

                            Current Password

                        </label>

                        <input
                            id="current-password"
                            type="password"
                            class="form-control">

                    </div>

                    <!-- NEW PASSWORD -->

                    <div class="mb-3">

                        <label class="form-label">

                            New Password

                        </label>

                        <input
                            id="new-password"
                            type="password"
                            class="form-control">

                    </div>

                    <!-- CONFIRM PASSWORD -->

                    <div class="mb-3">

                        <label class="form-label">

                            Confirm Password

                        </label>

                        <input
                            id="confirm-password"
                            type="password"
                            class="form-control">

                    </div>

                </form>

            </div>

            <!-- FOOTER -->

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Cancel

                </button>

                <button
                    id="btn-save-password"
                    class="btn btn-primary">

                    Save

                </button>

            </div>

        </div>

    </div>

</div>
