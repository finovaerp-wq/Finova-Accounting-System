FINOVA ACCOUNTING SYSTEM
General Journal
Version : 2.0 Enterprise
==========================================================
-->

<div class="gl-journal-page">

    <!-- ==========================================================
     PAGE HEADER
========================================================== -->

<div class="finova-page-header">

    <!-- LEFT -->

    <div class="finova-page-header-left">

        <h1 class="finova-page-title">

            General Journal

        </h1>

        <p class="finova-page-subtitle">

            Accounting / General Journal

        </p>

    </div>

    <!-- RIGHT -->

    <div class="finova-page-header-right">

        <button
            id="btn-add-journal"
            class="btn btn-primary finova-btn">

            <i class="fas fa-plus"></i>

            Add Journal

        </button>

        <button
            id="btn-download-journal"
            class="btn btn-outline-success finova-btn">

            <i class="fas fa-file-excel"></i>

            Download Excel

        </button>

        <button
            id="btn-refresh-journal"
            class="btn btn-outline-secondary finova-btn">

            <i class="fas fa-rotate-right"></i>

            Refresh

        </button>

    </div>

</div>

    <!-- ==========================================================
         FILTER CARD
    =========================================================== -->

    <div class="card gl-journal-filter-card">

        <div class="card-body">

            <div class="row g-3 align-items-end">

                <!-- ==========================================
                     ACCOUNTING DATE FROM
                =========================================== -->

                <div class="col-xl-2 col-lg-3 col-md-6">

                    <label
                        for="filter-date-from"
                        class="form-label">

                        Accounting Date From

                    </label>

                    <input
                        id="filter-date-from"
                        type="date"
                        class="form-control">

                </div>

                <!-- ==========================================
                     ACCOUNTING DATE TO
                =========================================== -->

                <div class="col-xl-2 col-lg-3 col-md-6">

                    <label
                        for="filter-date-to"
                        class="form-label">

                        Accounting Date To

                    </label>

                    <input
                        id="filter-date-to"
                        type="date"
                        class="form-control">

                </div>

                

                <!-- ==========================================
                     JOURNAL STATUS
                =========================================== -->

                <div class="col-xl-2 col-lg-3 col-md-6">

                    <label
                        for="filter-status"
                        class="form-label">

                        Journal Status

                    </label>

                    <select
                        id="filter-status"
                        class="form-select">

                        <option value="all">

                            Show All Data

                        </option>

                        <option value="Draft">

                            Show Draft Only

                        </option>

                        <option value="Posted">

                            Show Posted Only

                        </option>

                    </select>

                </div>
                                <!-- ==========================================
                     FIND BY
                =========================================== -->

                <div class="col-xl-2 col-lg-3 col-md-6">

                    <label
                        for="filter-find-by"
                        class="form-label">

                        Find By

                    </label>

                    <select
                        id="filter-find-by"
                        class="form-select">

                        <option value="journal_no">

                            Journal No

                        </option>

                        <option value="description">

                            Description

                        </option>


                    </select>

                </div>

                <!-- ==========================================
                     KEYWORD
                =========================================== -->

                <div class="col-xl-4 col-lg-6 col-md-12">

    <label
        for="filter-keyword"
        class="form-label">

        Keyword

    </label>

    <div class="input-group">

        <input
            id="filter-keyword"
            type="text"
            class="form-control"
            placeholder="Search Journal No or Description...">

        <button
            id="btn-find-journal"
            type="button"
            class="btn btn-primary">

            <i class="fa-solid fa-magnifying-glass"></i>

            Find

        </button>

    </div>

</div>
</div> <!-- End Row -->

</div> <!-- End Card Body -->

</div> <!-- End Filter Card -->

    <!-- ==========================================================
         TABLE CARD
    =========================================================== -->

    <div class="card gl-journal-table-card">

        <div
            id="gl-journal-table-wrapper"
            class="table-responsive">

                <table
                    id="gl-journal-table"
                    class="table table-hover align-middle">

                    <thead>

                        <tr>

                            <th style="width:70px;">

                                No

                            </th>

                            <th style="width:150px;">

                                Accounting Date

                            </th>

                            <th style="width:180px;">

                                Journal No

                            </th>

                            <th>

                                Description

                            </th>

                            <th
                                class="text-end"
                                style="width:170px;">

                                Total Debit

                            </th>

                            <th
                                class="text-end"
                                style="width:170px;">

                                Total Credit

                            </th>

                            <th
                                class="text-center"
                                style="width:130px;">

                                Status

                            </th>

                            <th
                                class="text-center"
                                style="width:90px;">

                                Action

                            </th>

                        </tr>

                    </thead>

                    <tbody id="gl-journal-tbody">

                        <!-- Render By JavaScript -->

                    </tbody>

                </table>

            </div>
                
<!-- ==========================================================
     PAGINATION
========================================================== -->

<div class="d-flex justify-content-between align-items-center px-3 py-3">

    <!-- LEFT -->

    <nav aria-label="General Journal Pagination">

        <ul class="pagination finova-pagination mb-0">

            <li class="page-item disabled">

                <button
                    id="btn-first-page"
                    class="page-link">

                    <i class="fa-solid fa-backward-step"></i>

                </button>

            </li>

            <li class="page-item disabled">

                <button
                    id="btn-prev-page"
                    class="page-link">

                    <i class="fa-solid fa-chevron-left"></i>

                </button>

            </li>

            <li class="page-item">

                <span class="finova-page-text">

                    Page

                </span>

            </li>

            <li class="page-item">

                <input
                    id="current-page"
                    type="number"
                    value="1"
                    min="1"
                    class="form-control form-control-sm finova-page-input">

            </li>

            <li class="page-item">

                <span
                    id="total-pages"
                    class="finova-page-text">

                    of 1

                </span>

            </li>

            <li class="page-item">

                <button
                    id="btn-next-page"
                    class="page-link">

                    <i class="fa-solid fa-chevron-right"></i>

                </button>

            </li>

            <li class="page-item">

                <button
                    id="btn-last-page"
                    class="page-link">

                    <i class="fa-solid fa-forward-step"></i>

                </button>

            </li>

        </ul>

    </nav>

    <!-- RIGHT -->

    <div
        id="display-record"
        class="finova-record-info">

        Records 0 - 0 of 0

    </div>

</div>
</div> <!-- End Card Body -->
</div> <!-- End Table Card -->

    <!-- ==========================================================
         MODAL CONTAINER
    =========================================================== -->

    <div id="gl-journal-modal-container"></div>

</div>
