<div
    class="modal fade"
    id="businessPartnerModal"
    tabindex="-1"
    data-bs-backdrop="static"
    data-bs-keyboard="false">

    <div class="modal-dialog modal-xl">

        <div class="modal-content">

            <!-- ==========================================
                 HEADER
            =========================================== -->

            <div class="modal-header">

                <h5
                    id="businessPartnerModalTitle"
                    class="modal-title">

                    Add Business Partner

                </h5>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal"
                    aria-label="Close">
                </button>

            </div>

            <!-- ==========================================
                 BODY
            =========================================== -->

            <div class="modal-body">

                <form id="businessPartnerForm">

                    <input
                        type="hidden"
                        id="bp-id">

                    <div class="row g-3">

                        <!-- Business Partner Name -->

                        <div class="col-md-12">

                            <label
                                for="bp-name"
                                class="form-label">

                                Business Partner Name
                                <span class="text-danger">*</span>

                            </label>

                            <input
                                type="text"
                                id="bp-name"
                                class="form-control"
                                maxlength="200"
                                required>

                        </div>

                        <!-- Type -->

                        <div class="col-md-4">

                            <label
                                for="bp-type-form"
                                class="form-label">

                                Type

                            </label>

                            <select
                                id="bp-type-form"
                                class="form-select">

                                <option value="Customer">Customer</option>
                                <option value="Vendor">Vendor</option>
                                <option value="Employee">Employee</option>

                            </select>

                        </div>

                        <!-- Term Of Payment -->

                        <div class="col-md-4">

                            <label
                                for="bp-top-id"
                                class="form-label">

                                Term Of Payment

                            </label>

                            <select
                                id="bp-top-id"
                                class="form-select">

                                <option value="">

                                    -- Select TOP --

                                </option>

                            </select>

                        </div>

                        <!-- Status -->

                        <div class="col-md-4">

                            <label
                                for="bp-status-form"
                                class="form-label">

                                Status

                            </label>

                            <select
                                id="bp-status-form"
                                class="form-select">

                                <option value="true">Active</option>
                                <option value="false">Inactive</option>

                            </select>

                        </div>

                        <!-- Phone -->

                        <div class="col-md-4">

                            <label
                                for="bp-phone"
                                class="form-label">

                                Phone

                            </label>

                            <input
                                type="text"
                                id="bp-phone"
                                class="form-control"
                                maxlength="50">

                        </div>

                        <!-- Email -->

                        <div class="col-md-4">

                            <label
                                for="bp-email"
                                class="form-label">

                                Email

                            </label>

                            <input
                                type="email"
                                id="bp-email"
                                class="form-control"
                                maxlength="100">

                        </div>

                        <!-- Tax Number -->

                        <div class="col-md-4">

                            <label
                                for="bp-tax-number"
                                class="form-label">

                                Tax Number (NPWP)

                            </label>

                            <input
                                type="text"
                                id="bp-tax-number"
                                class="form-control"
                                maxlength="30">

                        </div>

                        <!-- Address -->

                        <div class="col-md-12">

                            <label
                                for="bp-address"
                                class="form-label">

                                Address

                            </label>

                            <textarea
                                id="bp-address"
                                class="form-control"
                                rows="3"></textarea>

                        </div>

                        <!-- City -->

                        <div class="col-md-6">

                            <label
                                for="bp-city"
                                class="form-label">

                                City

                            </label>

                            <input
                                type="text"
                                id="bp-city"
                                class="form-control"
                                maxlength="100">

                        </div>

                        <!-- Country -->

                        <div class="col-md-6">

                            <label
                                for="bp-country"
                                class="form-label">

                                Country

                            </label>

                            <input
                                type="text"
                                id="bp-country"
                                class="form-control"
                                value="Indonesia">

                        </div>

                    </div>

                    <!-- ==========================================
                         BANK ACCOUNT
                    =========================================== -->

                    <hr class="my-4">

                    <div
                        class="d-flex justify-content-between align-items-center mb-3">

                        <h5 class="mb-3">

                            Bank Accounts
                            <span class="text-danger">*</span>

                        </h5>

                        <button
                            type="button"
                            id="btn-add-bank-row"
                            class="btn btn-primary btn-sm">

                            <i class="fa-solid fa-plus me-1"></i>

                            Add Bank

                        </button>

                    </div>

                    <div class="table-responsive">

                        <table
                            class="table table-bordered table-hover align-middle">

                            <thead class="table-light">

                                <tr>

                                    <th style="width:18%;">
                                        Bank
                                    </th>

                                    <th style="width:24%;">
                                        Account Holder
                                    </th>

                                    <th style="width:20%;">
                                        Account Number
                                    </th>

                                    <th style="width:15%;">
                                        Branch
                                    </th>

                                    <th style="width:12%;">
                                        Purpose
                                    </th>

                                    <th style="width:8%;" class="text-center">
                                        Default
                                    </th>

                                    <th style="width:3%;" class="text-center">

                                    </th>

                                </tr>

                            </thead>

                            <tbody id="bp-bank-table">

                                <!-- Dynamic Row -->

                            </tbody>

                        </table>

                    </div>

                </form>

            </div>

            <!-- ==========================================
                 FOOTER
            =========================================== -->

            <div class="modal-footer">

                <button
                    type="button"
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Cancel

                </button>

                <button
                    type="button"
                    id="btn-save-business-partner"
                    class="btn btn-primary">

                    <i class="fa-solid fa-floppy-disk me-1"></i>

                    Save

                </button>

            </div>

        </div>

    </div>

</div>
